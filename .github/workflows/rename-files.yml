on:
  push:
    branches:
      - main

jobs:
  rename:
    runs-on: ubuntu-latest
    if: github.repository != 'test-rename-fork'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # On vérifie que le marqueur existe — sinon on arrête
      - name: Check sentinel file
        id: check
        run: |
          if [ -f ".github/TEMPLATE_MARKER" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Rename files and replace placeholders
        if: steps.check.outputs.should_run == 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          bash scripts/rename.sh "$REPO_NAME"

      - name: Remove sentinel file
        if: steps.check.outputs.should_run == 'true'
        run: rm -f .github/TEMPLATE_MARKER

      - name: Commit changes
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initialize repository as '${{ github.event.repository.name }}'"
          git push